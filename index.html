<!DOCTYPE html>
<html lang="ko">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Apple SD Gothic Neo',sans-serif;background:#eef0f8;min-height:100vh;display:flex;justify-content:center;align-items:flex-start}
.page{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;padding:1.4rem 1.1rem 2rem;gap:1rem}
.title{font-size:1.15rem;font-weight:700;color:#4a47a3;text-align:center;line-height:1.5}
.subtitle{font-size:0.8rem;color:#aaa;text-align:center;margin-top:2px}
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-bar-bg{flex:1;height:8px;background:#d0d3e8;border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;background:#4a47a3;border-radius:99px;transition:width .35s}
.progress-label{font-size:0.8rem;color:#4a47a3;font-weight:700;min-width:38px;text-align:right}
.card{background:#fff;border-radius:20px;padding:1.6rem 1.3rem 1.4rem;display:flex;flex-direction:column;gap:1.1rem;box-shadow:0 3px 16px rgba(74,71,163,0.1)}
.sentence{font-size:1.05rem;color:#1a1a1a;line-height:2.8;display:flex;flex-wrap:wrap;align-items:center;gap:6px;word-break:keep-all}
select{font-size:1rem;padding:7px 10px;border:2px solid #b0b4d4;border-radius:12px;background:#f5f6fc;color:#333;cursor:pointer;outline:none;-webkit-appearance:auto;appearance:auto;min-width:90px;max-width:100%}
select:focus{border-color:#4a47a3}
select.answered{border-color:#4a47a3;background:#edeefa;color:#4a47a3;font-weight:700}
.hint-btn{align-self:flex-start;background:none;border:2px solid #d0d3e8;border-radius:99px;padding:7px 16px;font-size:0.85rem;color:#4a47a3;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:600}
.hint-btn:active{background:#edeefa}
.hint-text{font-size:0.9rem;color:#555;background:#f5f6fc;border-radius:12px;padding:12px 14px;display:none;line-height:1.9;border-left:4px solid #b0b4d4;word-break:keep-all}
.nav{display:flex;gap:10px;margin-top:0.4rem}
.btn-prev{flex:1;padding:15px 0;border-radius:99px;font-size:1rem;font-weight:700;border:none;cursor:pointer;background:#ccc;color:#fff;letter-spacing:0.02em}
.btn-prev:active{background:#aaa}
.btn-next{flex:2;padding:15px 0;border-radius:99px;font-size:1rem;font-weight:700;border:none;cursor:pointer;background:#4a47a3;color:#fff;letter-spacing:0.02em}
.btn-next:active{background:#3835a0}
.result-card{background:#fff;border-radius:20px;padding:2.4rem 1.6rem 2rem;text-align:center;box-shadow:0 3px 16px rgba(74,71,163,0.1)}
.result-score{font-size:4rem;font-weight:800;color:#4a47a3;line-height:1}
.result-total{font-size:1rem;color:#aaa;margin-top:6px}
.result-time{font-size:0.95rem;color:#4a47a3;font-weight:700;background:#edeefa;display:inline-block;padding:7px 22px;border-radius:99px;margin-top:14px}
.result-msg{font-size:0.95rem;color:#444;line-height:1.8;margin-top:14px;word-break:keep-all}
.capture-msg{font-size:0.9rem;font-weight:700;color:#185FA5;background:#E6F1FB;padding:0.9rem 1.1rem;border-radius:14px;display:block;line-height:1.8;margin-top:16px}
.retry-btn{margin-top:1.2rem;display:block;width:100%;padding:15px 0;border-radius:99px;font-size:1rem;font-weight:700;border:none;cursor:pointer;background:#4a47a3;color:#fff}
</style>
</head>
<body>
<div class="page">
  <div>
    <div class="title">Lesson 4. Are You a Smart Shopper?</div>
    <div class="subtitle">한 문제씩 풀어보세요! 💪</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar"></div></div>
    <div class="progress-label" id="plabel"></div>
  </div>
  <div id="main-area"></div>
</div>

<script>
const qs=[
  {before:"Do you",b1:["think",["think","know","say","believe"]],mid:"you are a",b2:["smart shopper",["smart shopper","big spender","fast buyer","careful reader"]],after:"?",hint:"여러분은 자신이 똑똑한 쇼핑객이라고 생각하시나요?"},
  {before:"Well, you may think",b1:["you are",["you are","it is","we do","so so"]],mid:", but",b2:["hold",["hold","wait","stop","think"]],after:"on!",hint:"글쎄요, 그렇다고 생각할 수 있지만, 잠깐만요!"},
  {before:"There are various",b1:["marketing strategies which",["marketing strategies which","product ideas that","selling tricks who","price methods what"]],mid:"",b2:null,after:"influence your decisions.",hint:"여러분의 결정에 영향을 미치는 다양한 마케팅 전략들이 있습니다."},
  {before:"",b1:["Learning",["Learning","Knowing","Reading","Thinking"]],mid:"about them will",b2:["make",["make","help","show","give"]],after:"you a smarter shopper.",hint:"이것들을 배우는 것은 여러분을 더 똑똑한 쇼핑객으로 만들어 줄 것입니다."},
  {before:"The sale",b1:["ends",["ends","starts","stops","begins"]],mid:"in two hours? If I don't buy the sneakers",b2:["now",["now","later","soon","today"]],after:", I will have to buy them at a higher price.",hint:"세일이 두 시간 후에 끝난다고? 지금 운동화를 사지 않으면, 더 비싼 가격에 사야 할 거야."},
  {before:"You're buying the sneakers",b1:["just because",["just because","even though","as long as","so that"]],mid:"you don't want to miss the",b2:["sale",["sale","deal","chance","event"]],after:".",hint:"너는 단지 세일을 놓치고 싶지 않아서 운동화를 사고 있는 거야."},
  {before:"You're",b1:["falling",["falling","looking","waiting","reaching"]],mid:"for a",b2:["hunger marketing",["hunger marketing","viral spread","anchoring effect","price drop"]],after:"strategy.",hint:"너는 헝거 마케팅 전략에 속고 있어."},
  {before:"",b1:["If",["If","When","Because","Unless"]],mid:"people can buy a product only for a",b2:["limited time",["limited time","short visit","small price","quick look"]],after:', they often feel "hungry" for it and want to buy it.',hint:"만약 사람들이 한정된 시간 동안만 제품을 구매할 수 있다면, 종종 그 제품에 대해 '배고프다고' 느끼고 구매하고 싶어 해."},
  {before:"About",b1:["missing",["missing","buying","losing","skipping"]],mid:"the",b2:["sale",["sale","deal","price","item"]],after:", don't worry, Junho.",hint:"세일을 놓치는 것에 대해서는, 걱정하지 마, 준호야."},
  {before:"You'll",b1:["soon",["soon","never","always","rarely"]],mid:"see a",b2:["similar",["similar","better","cheaper","bigger"]],after:"sale again.",hint:"너는 곧 비슷한 세일을 다시 보게 될 거야."},
  {before:"That's the hottest dress on",b1:["social media",["social media","the market","TV ads","online stores"]],mid:"now. Lots of people are wearing it. I",b2:["have to",["have to","need to","want to","used to"]],after:"get that dress, too!",hint:"저건 지금 소셜 미디어에서 가장 인기 있는 드레스야. 나도 저 드레스를 사야겠어!"},
  {before:"",b1:["Wait",["Wait","Stop","Listen","Look"]],mid:", Yuna! You",b2:["only",["only","really","mostly","surely"]],after:"want the dress because you saw it again and again on social media.",hint:"잠깐, 유나야! 너는 그 드레스를 소셜 미디어에서 계속해서 봤기 때문에 원하는 것뿐이야."},
  {before:"It",b1:["isn't just",["isn't just","is only","isn't only","is just"]],mid:"you.",b2:null,after:"",hint:"너뿐만이 아니야."},
  {before:"There are a lot of people",b1:["who",["who","whose","what","which"]],mid:"fall for a",b2:["viral marketing",["viral marketing","hunger marketing","anchoring effect","price strategy"]],after:"strategy.",hint:"바이럴 마케팅 전략에 속는 사람들이 많이 있어."},
  {before:"Information about a",b1:["product",["product","person","store","brand"]],mid:"can",b2:["spread",["spread","grow","appear","travel"]],after:'quickly and widely on the Internet, just like a "virus."',hint:"제품에 대한 정보가 인터넷에서 '바이러스'처럼 빠르고 널리 퍼질 수 있어."},
  {before:"",b1:["If",["If","Since","Although","Unless"]],mid:"a",b2:["product",["product","brand","store","ad"]],after:"becomes hot on social media, people naturally want to have it.",hint:"만약 어떤 제품이 소셜 미디어에서 인기를 끌게 되면, 사람들은 자연스럽게 그 제품을 갖고 싶어 해."},
  {before:"Yuna, just",b1:["remember",["remember","know","think","accept"]],mid:"that a",b2:["popular",["popular","cheap","trendy","famous"]],after:"product isn't always right for you.",hint:"유나야, 인기 있는 제품이 항상 너에게 맞는 것은 아니라는 걸 기억해."},
  {before:"I'm",b1:["looking for",["looking for","shopping at","buying from","searching about"]],mid:"a lipstick",b2:["for",["for","to","with","about"]],after:"my mom.",hint:"저는 엄마를 위한 립스틱을 찾고 있어요."},
  {before:"Salesperson: What",b1:["about",["about","if","for","else"]],mid:"this? Somi:",b2:["Expensive",["Expensive","Perfect","Beautiful","Lovely"]],after:"! I thought I could buy a lipstick for 30 dollars.",hint:"판매원: 이건 어때요? 소미: 비싸네요! 저는 립스틱을 30달러에 살 수 있을 줄 알았어요."},
  {before:"This is also",b1:["popular",["popular","cheap","new","rare"]],mid:". Somi: That's",b2:["better",["better","great","fine","cheaper"]],after:"!",hint:"판매원: 이것도 인기가 많아요. 소미: 그게 더 좋네요!"},
  {before:"",b1:["Hold on",["Hold on","Wait up","Come on","Slow down"]],mid:", Somi! Your",b2:["budget",["budget","price","plan","goal"]],after:"is 30 dollars, but you are buying a 40-dollar lipstick.",hint:"잠깐, 소미야! 너의 예산은 30달러지만, 너는 40달러짜리 립스틱을 사고 있어."},
  {before:"The 40-dollar lipstick sounds",b1:["cheap",["cheap","good","nice","low"]],mid:"only because the salesperson",b2:["showed",["showed","gave","sold","offered"]],after:"you a 50-dollar lipstick first.",hint:"판매원이 50달러짜리 립스틱을 먼저 보여줬기 때문에 40달러짜리 립스틱이 저렴하게 들리는 거야."},
  {before:"This is an",b1:["example",["example","effect","idea","case"]],mid:"of the",b2:["anchoring effect",["anchoring effect","viral marketing","hunger marketing","price strategy"]],after:".",hint:"이건 앵커링 효과의 예시야."},
  {before:"Usually, the first piece of",b1:["information",["information","data","advice","news"]],mid:'becomes an "anchor" and',b2:["influences",["effects","influences","changes","decides"]],after:"the shopper's decision.",hint:"보통, 첫 번째 정보가 '닻'이 되고 쇼핑객의 결정에 영향을 미쳐."},
  {before:"In your",b1:["case",["opinion","case","example","turn"]],mid:", the",b2:["50-dollar",["50-dollar","30-dollar","40-dollar","20-dollar"]],after:"lipstick was the anchor.",hint:"너의 경우에는, 50달러짜리 립스틱이 닻이였어."},
  {before:"Somi, don't just",b1:["rely on",["rely on","hold on","think about","focus on"]],mid:"the first",b2:["piece",["piece","bit","part","type"]],after:"of information that is given to you.",hint:"소미야, 너에게 주어진 첫 번째 정보에만 의존하지 마."},
];

const N=qs.length;
let cur=0;
const scores=Array(N).fill(null);
let startTime=null;

function formatTime(sec){const m=Math.floor(sec/60),s=sec%60;return(m>0?m+'분 ':'')+s+'초';}
function startTimer(){startTime=Date.now();}
function getElapsed(){if(!startTime)return 0;return Math.floor((Date.now()-startTime)/1000);}
function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function renderCard(i){
  const q=qs[i];
  const ma=document.getElementById('main-area');
  ma.innerHTML='';

  const card=document.createElement('div');card.className='card';
  const sent=document.createElement('div');sent.className='sentence';

  function addText(t){if(!t)return;const sp=document.createElement('span');sp.textContent=t;sent.appendChild(sp);}
  function addSelect(opts,answerId,savedVal){
    const sel=document.createElement('select');
    sel.id=answerId;sel.dataset.answer=opts[0];
    const shuffled=shuffle(opts[1]);
    const def=document.createElement('option');def.value='';def.textContent='???';sel.appendChild(def);
    shuffled.forEach(o=>{const op=document.createElement('option');op.value=o;op.textContent=o;sel.appendChild(op);});
    if(savedVal){sel.value=savedVal;if(savedVal!=='')sel.classList.add('answered');}
    sel.addEventListener('change',()=>{
      sel.classList.remove('answered');
      if(sel.value!=='')sel.classList.add('answered');
      saveScore(i);
    });
    sent.appendChild(sel);
  }

  const sv=scores[i];
  if(q.before)addText(q.before);
  addSelect(q.b1,'s1',sv?sv.v1:null);
  if(q.mid)addText(q.mid);
  if(q.b2)addSelect(q.b2,'s2',sv?sv.v2:null);
  if(q.after)addText(q.after);
  card.appendChild(sent);

  const hbtn=document.createElement('button');hbtn.className='hint-btn';hbtn.innerHTML='💡 힌트 보기';
  const htxt=document.createElement('div');htxt.className='hint-text';htxt.textContent=q.hint;
  hbtn.onclick=()=>{const vis=htxt.style.display==='block';htxt.style.display=vis?'none':'block';hbtn.innerHTML=vis?'💡 힌트 보기':'💡 힌트 숨기기';};
  card.appendChild(hbtn);
  card.appendChild(htxt);
  ma.appendChild(card);

  const nav=document.createElement('div');nav.className='nav';
  const bp=document.createElement('button');bp.className='btn-prev';bp.textContent='← 이전';bp.onclick=()=>go(-1);
  const bn=document.createElement('button');bn.className='btn-next';
  bn.textContent=i===N-1?'제출 ✓':'다음 →';
  bn.onclick=()=>go(1);
  nav.appendChild(bp);nav.appendChild(bn);
  ma.appendChild(nav);

  updateProgress();
}

function saveScore(i){
  const s1=document.getElementById('s1'),s2=document.getElementById('s2');
  scores[i]={v1:s1?s1.value:null,v2:s2?s2.value:null};
}

function calcScore(){
  let c=0,t=0;
  qs.forEach((q,i)=>{t++;const sv=scores[i];let ok=sv&&sv.v1===q.b1[0];if(q.b2)ok=ok&&sv&&sv.v2===q.b2[0];if(ok)c++;});
  return{c,t};
}

function updateProgress(){
  const pct=((cur+1)/N*100).toFixed(0);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plabel').textContent=(cur+1)+'/'+N;
}

function showResult(){
  saveScore(cur);
  const elapsed=getElapsed();
  const{c,t}=calcScore();
  const ma=document.getElementById('main-area');
  ma.innerHTML='';
  document.getElementById('pbar').style.width='100%';
  document.getElementById('plabel').textContent=N+'/'+N;
  const rc=document.createElement('div');rc.className='result-card';
  let msg='';const pct=c/t;
  if(pct===1)msg='완벽해요! 모든 문제를 맞혔어요! 🎉';
  else if(pct>=0.8)msg='아주 잘했어요! 조금만 더 복습해봐요. 😊';
  else if(pct>=0.6)msg='좋아요! 틀린 부분을 다시 확인해봐요. 🙂';
  else msg='더 열심히 복습해봐요. 다시 도전해봐요! 💪';
  rc.innerHTML=`
    <div class="result-score">${c}</div>
    <div class="result-total">/ ${t} 문제 정답</div>
    <div class="result-time">⏱ 소요 시간: ${formatTime(elapsed)}</div>
    <div class="result-msg">${msg}</div>
    <div class="capture-msg">📸 이 화면을 캡처해서<br>'패들렛'에 제출하세요~</div>
    <button class="retry-btn" onclick="restart()">다시 풀기</button>
  `;
  ma.appendChild(rc);
}

function go(dir){
  saveScore(cur);cur+=dir;
  if(cur>=N){showResult();return;}
  if(cur<0)cur=0;
  renderCard(cur);
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
  cur=0;scores.fill(null);startTime=null;
  renderCard(0);startTimer();
  window.scrollTo({top:0,behavior:'smooth'});
}

renderCard(0);
startTimer();
</script>
</body>
</html>
